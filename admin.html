<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control — TRÉBOL 777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-6 min-h-screen flex flex-col items-center font-sans">

    <!-- FORMULARIO DE LOGIN -->
    <div id="login-form" class="w-full max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg mt-20">
        <h2 class="text-3xl font-bold mb-6 text-center text-gray-800 tracking-tighter">🍀 Trébol Admin</h2>
        <div class="mb-4">
            <label class="block text-gray-600 text-xs font-bold uppercase mb-1">Correo Electrónico</label>
            <input type="email" id="email" class="w-full p-3 border-2 border-gray-100 rounded-lg focus:border-blue-500 outline-none transition-all" value="panter.akamc@gmail.com">
        </div>
        <div class="mb-6">
            <label class="block text-gray-600 text-xs font-bold uppercase mb-1">Contraseña</label>
            <input type="password" id="password" class="w-full p-3 border-2 border-gray-100 rounded-lg focus:border-blue-500 outline-none transition-all">
        </div>
        <button onclick="login()" class="w-full bg-[#1e3a8a] hover:bg-blue-900 text-white py-3 rounded-lg font-bold text-lg transition-all shadow-lg">Iniciar Sesión</button>
        <p id="login-error" class="text-red-500 text-center mt-4 text-sm hidden font-medium"></p>
    </div>

    <!-- PANEL DE ADMINISTRACIÓN -->
    <div id="admin-panel" class="hidden w-full max-w-6xl mx-auto mt-10">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 gap-4">
            <div>
                <h1 class="text-3xl font-black text-gray-800 tracking-tight">📊 Gestión de Ventas</h1>
                <p class="text-sm text-gray-400" id="admin-status">Conectado al servidor</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="loadData()" class="bg-gray-50 hover:bg-gray-100 text-gray-600 px-4 py-2.5 rounded-xl transition-all border border-gray-200 font-bold text-sm">🔄 Refrescar</button>
                <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl shadow-lg shadow-blue-200 transition-all font-bold text-sm">➕ Registrar Compra</button>
                <button onclick="logout()" class="bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2.5 rounded-xl transition-all font-bold text-sm">Salir</button>
            </div>
        </div>
        
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-gray-400">
                        <tr>
                            <th class="p-4 font-bold uppercase text-[10px] tracking-widest">Cliente</th>
                            <th class="p-4 font-bold uppercase text-[10px] tracking-widest">WhatsApp</th>
                            <th class="p-4 font-bold uppercase text-[10px] tracking-widest text-blue-600">Boletos</th>
                            <th class="p-4 font-bold uppercase text-[10px] tracking-widest">Estado</th>
                            <th class="p-4 font-bold uppercase text-[10px] tracking-widest text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="data-table" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL DE FORMULARIO -->
    <div id="crud-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all border border-white/20">
            <div class="bg-gray-900 text-white p-6 flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-black tracking-tight">Registro de Venta</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white text-3xl font-light">&times;</button>
            </div>
            <div class="p-8">
                <form id="record-form" onsubmit="event.preventDefault(); saveRecord();">
                    <div class="mb-5">
                        <label class="block text-gray-500 text-[10px] font-bold uppercase mb-2">Nombre Completo</label>
                        <input type="text" id="form-name" class="w-full p-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all font-bold text-gray-700" placeholder="Juan Pérez" required>
                    </div>
                    <div class="mb-5">
                        <label class="block text-gray-500 text-[10px] font-bold uppercase mb-2">WhatsApp (Ej: +524771234567)</label>
                        <input type="text" id="form-phone" class="w-full p-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all font-mono" placeholder="+52..." required>
                    </div>
                    <div class="mb-5">
                        <label class="block text-blue-500 text-[10px] font-bold uppercase mb-2">Boletos (Separados por coma)</label>
                        <input type="text" id="form-tickets" class="w-full p-4 bg-blue-50 border-2 border-blue-100 rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all font-black text-blue-700 placeholder:text-blue-300" placeholder="001, 123, 399" required>
                    </div>
                    <div class="mb-8">
                        <label class="block text-gray-500 text-[10px] font-bold uppercase mb-2">Estado del Pago</label>
                        <select id="form-status" class="w-full p-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all font-bold">
                            <option value="pending">🟡 Pendiente</option>
                            <option value="paid">🟢 Pagado</option>
                            <option value="cancelled">🔴 Cancelado</option>
                        </select>
                    </div>
                    <div class="flex gap-3">
                        <button type="button" onclick="closeModal()" class="flex-1 px-6 py-4 text-gray-400 bg-gray-100 rounded-2xl font-bold hover:bg-gray-200 transition-all uppercase text-xs tracking-widest">Cancelar</button>
                        <button type="submit" id="btn-save" class="flex-[2] px-8 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all uppercase text-xs tracking-widest">Guardar Datos</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://auqxarsyigimlcejixld.supabase.co';
        const supabaseKey = 'sb_publishable_5LaGv8jrhP5lA2AngpAp7w_YZFX0aQB'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    document.getElementById('login-error').textContent = error.message;
                    document.getElementById('login-error').classList.remove('hidden');
                } else { checkUser(); }
            } catch (err) { alert("Sin conexión a Supabase"); }
        }

        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('admin-status').textContent = `Admin: ${user.email}`;
                loadData();
            }
        }

        async function logout() { await _supabase.auth.signOut(); location.reload(); }

        let currentCustomers = [];

        async function loadData() {
            const tbody = document.getElementById('data-table');
            tbody.innerHTML = '<tr><td colspan="5" class="p-16 text-center text-gray-300 font-bold italic animate-pulse">Cargando datos...</td></tr>';

            // Usamos la relación fk_cliente que definimos en el SQL
            const { data, error } = await _supabase
                .from('customers')
                .select(`full_name, whatsapp_number, payment_status, tickets!fk_cliente(ticket_number)`);

            if (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500 font-bold text-sm">Error: ${error.message}</td></tr>`;
                return;
            }

            currentCustomers = data || [];
            if (currentCustomers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-16 text-center text-gray-400 font-medium">No hay registros.</td></tr>';
                return;
            }

            tbody.innerHTML = currentCustomers.map(c => {
                const ticketsList = c.tickets && Array.isArray(c.tickets) && c.tickets.length > 0 
                    ? c.tickets.map(t => t.ticket_number).sort().join(', ') 
                    : '<span class="text-red-300 font-normal italic">Ninguno</span>';

                return `
                <tr class="hover:bg-blue-50/50 transition-all">
                    <td class="p-5 font-black text-gray-800">${c.full_name}</td>
                    <td class="p-5 text-gray-400 font-mono text-xs">${c.whatsapp_number}</td>
                    <td class="p-5 text-blue-600 font-black tracking-tighter text-lg">${ticketsList}</td>
                    <td class="p-5">
                        <span class="px-3 py-1.5 rounded-xl text-[10px] font-black uppercase ${
                            c.payment_status === 'paid' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'
                        }">${c.payment_status}</span>
                    </td>
                    <td class="p-5 text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick="openModal(true, '${c.whatsapp_number}')" class="p-2 hover:bg-white rounded-lg transition-all shadow-sm border border-transparent hover:border-gray-100">✏️</button>
                            <button onclick="deleteRecord('${c.whatsapp_number}')" class="p-2 hover:bg-red-50 rounded-lg transition-all text-red-300 hover:text-red-500">🗑️</button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function openModal(edit = false, phone = '') {
            document.getElementById('crud-modal').classList.remove('hidden');
            if (edit) {
                document.getElementById('modal-title').textContent = "✏️ Editar Registro";
                const c = currentCustomers.find(i => i.whatsapp_number === phone);
                document.getElementById('form-name').value = c.full_name;
                document.getElementById('form-phone').value = c.whatsapp_number;
                document.getElementById('form-phone').readOnly = true;
                document.getElementById('form-status').value = c.payment_status;
                const ticketNumbers = c.tickets && Array.isArray(c.tickets) ? c.tickets.map(t => t.ticket_number).join(', ') : '';
                document.getElementById('form-tickets').value = ticketNumbers;
            } else {
                document.getElementById('modal-title').textContent = "➕ Nuevo Registro";
                document.getElementById('record-form').reset();
                document.getElementById('form-phone').readOnly = false;
                document.getElementById('form-status').value = 'pending';
            }
        }

        function closeModal() { document.getElementById('crud-modal').classList.add('hidden'); }

        async function saveRecord() {
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.textContent = "GUARDANDO...";

            const name = document.getElementById('form-name').value.trim();
            const phone = document.getElementById('form-phone').value.trim();
            const status = document.getElementById('form-status').value;
            const ticketsInput = document.getElementById('form-tickets').value;
            
            const ticketsArr = ticketsInput.split(',')
                .map(t => t.trim())
                .filter(t => t.length > 0)
                .map(t => t.padStart(3, '0')); 

            try {
                // 1. Manejo manual de cliente (Verificar y luego Insert/Update)
                const { data: existing } = await _supabase.from('customers').select('whatsapp_number').eq('whatsapp_number', phone).single();

                if (existing) {
                    await _supabase.from('customers').update({ full_name: name, payment_status: status }).eq('whatsapp_number', phone);
                } else {
                    await _supabase.from('customers').insert({ full_name: name, whatsapp_number: phone, payment_status: status });
                }

                // 2. Limpiar boletos previos
                await _supabase.from('tickets').delete().eq('whatsapp_number', phone);

                // 3. Insertar nuevos boletos
                if (ticketsArr.length > 0) {
                    const toInsert = ticketsArr.map(num => ({
                        ticket_number: num, 
                        whatsapp_number: phone, 
                        ticket_status: 'active'
                    }));
                    const { error: tErr } = await _supabase.from('tickets').insert(toInsert);
                    if (tErr) throw tErr;
                }

                closeModal();
                loadData();
            } catch (err) { 
                alert("⚠️ Error al guardar: " + err.message); 
            } finally { 
                btn.disabled = false; 
                btn.textContent = "Guardar Datos"; 
            }
        }

        async function deleteRecord(phone) {
            if (!confirm(`¿Eliminar registro?`)) return;
            try {
                await _supabase.from('tickets').delete().eq('whatsapp_number', phone);
                await _supabase.from('customers').delete().eq('whatsapp_number', phone);
                loadData();
            } catch (err) { alert("Error al eliminar"); }
        }

        checkUser();
    </script>
</body>
</html>
